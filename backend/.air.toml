root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/cc-poker-backend-dev.exe ./cmd/server"
bin = "./tmp/cc-poker-backend-dev.exe"
full_bin = ""
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["tmp", "vendor", ".git"]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = false
follow_symlink = false
log = "air-build-errors.log"
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = 500
poll = false
poll = true
poll_interval = 700

[log]
time = true

[misc]
clean_on_exit = true
